<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>set interval</title>
  </head>
  <body>
    <h1>Hello World</h1>
    <h3>This is an example of using the set Interval() method</h3>
    <p>Here an alert dialog box display on every three second</p>
    <script>
      var a = setInterval(() => {
        alert("Welcome to the JavaScript");
      }, 3000);
    </script>
  </body>
</html>
