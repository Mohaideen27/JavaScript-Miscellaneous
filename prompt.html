<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prompt</title>
  </head>
  <body>
    <p>Click the following button to see the effect</p>
    <form action="">
      <input type="button" value="Click me" onclick="fun()" />
    </form>
    <script>
      function fun() {
        var v = prompt("This is a prompt box", "hello world");
        document.writeln(v);
      }
    </script>
  </body>
</html>
