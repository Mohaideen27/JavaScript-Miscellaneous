<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>set Interval</title>
  </head>
  <body>
    <script>
      var logic = setInterval(time, 2000);
      function time() {
        var x = new Date();
        var y = x.toLocaleTimeString();
        console.log(y);
      }
      function funstop() {
        clearInterval(logic);
      }
      //   funstop();
    </script>
  </body>
</html>
