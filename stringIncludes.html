<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>string includes</title>
  </head>
  <body>
    <h1>Hello World</h1>
    <h3>This is an example of using the javascript string includes method</h3>
    <script>
      let str = "Welcome to the javascript practice";
      document.write("<b>The given string is: </b>", str);
      document.writeln("<br>");
      let res = str.includes("to");
      document.writeln("<b>The result is: </b>", res);
    </script>
  </body>
</html>
