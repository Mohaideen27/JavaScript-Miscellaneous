<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alert</title>
  </head>
  <body>
    <p>click the following button to see the effect</p>
    <form action="">
      <input type="button" value="Click me" onclick="fun()" />

    <script>
      function fun() {
        alert("This is an alert dialog box");
      }
    </script>
  </body>
</html>
