<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SleepWait</title>
  </head>
  <body>
    <script>
      function sleep(ms) {
        return new Promise((resolve) => {
          setTimeout(resolve, ms);
        });
      }
      async function fun() {
        document.write("Hello World");
        for (let i = 1; i <= 10; i++) {
          await sleep(2000);
          document.write(i + " " + "Welcome to the javascript" + " " + "</br>");
        }
      }
      fun();
    </script>
  </body>
</html>
