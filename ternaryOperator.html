<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ternary operator</title>
  </head>
  <body>
    <script>
      let a = 358;
      let val = a % 2==0 ? "even" : "odd";
      alert(val);
    </script>
    <h1>Welcome to the JavaScript</h1>
    <h3>This is an example of ternary operator</h3>
  </body>
</html>
